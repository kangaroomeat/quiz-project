<!doctype html>
<html>
    <head lang="en-us">
        <title>Quiz app</title>
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">
    </head>
    <body>
        
        <div class="card">

            <div class="question-number">question 1</div>

            <div class="question">What is 2 + 2?</div>

            <h3>type answer here:</h3>

            <div class="user-question-input">
                <input type="text" class="answer-box">
                
            </div>

            <div class="button-div">
                <button class="check-answer">Check answer</button>

            </div>
            

            

            <div class="result correct">correct answer</div>

            <div class="result incorrect">incorrect answer</div>

        </div>
        
        
        
        <script src="app.js"></script>
    </body>
</html>
